<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Taskly</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="appContainer">
        <aside class="sidebar">
            <div class="sidebarTitleBar">
                <h3 id="sidebarTitle">Menu</h3>
            </div>

            <div class="sidebarSearch">
                <img src="../../assets/icons/search.svg" id="searchIcon">
                <input type="text" id="sidebarSearchInput" placeholder="Search">
            </div>

            <div class="sidebarNavigation">
                <div class="sidebarMenus">
                    <button id="menuItem">
                        <span id="menuItemIcon"><img src="../../assets/icons/home.svg"></span>
                        <span id="menuItemText">All Tasks</span>
                    </button>

                    <button id="menuItem">
                        <span id="menuItemIcon"><img src="../../assets/icons/calendar.svg"></span>
                        <span id="menuItemText">Today</span>
                    </button>

                    <button id="menuItem">
                        <span id="menuItemIcon"><img src="../../assets/icons/star.svg"></span>
                        <span id="menuItemText">İmportant</span>
                    </button>
                </div>

                <div class="separator">
                   <hr>
                </div>
                
                <div class="sidebarNavigationFooter">
                    <button id="menuItem">
                        <span id="menuItemIcon"><img src="../../assets/icons/settings.svg"></span>
                        <span id="menuItemText">Settings</span>
                    </button>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
